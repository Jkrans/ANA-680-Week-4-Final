<!DOCTYPE html>
<html>
<head>
  <title>Iris Species Predictor</title>
  <style>
    body { font-family: Arial, sans-serif; background:#f4f6f8; margin:0; padding:0; }
    .card { width:420px; margin:60px auto; background:#fff; padding:24px; border-radius:12px;
            box-shadow:0 8px 20px rgba(0,0,0,0.08); }
    h2 { margin:0 0 10px; color:#222; }
    p { margin:0 0 18px; color:#555; }
    label { display:block; margin:12px 0 6px; font-weight:bold; color:#333; }
    input { width:100%; padding:10px; border:1px solid #ccc; border-radius:8px; box-sizing:border-box; }
    button { width:100%; margin-top:18px; padding:12px; border:0; border-radius:10px;
             background:#2563eb; color:white; font-size:16px; cursor:pointer; }
    button:hover { background:#1d4ed8; }
    .result { margin-top:18px; padding:12px; border-radius:10px; background:#e8f0ff; color:#123; text-align:center; }
    .note { font-size:12px; color:#777; margin-top:10px; }
    .grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .grid > div { display:flex; flex-direction:column; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Iris Species Predictor</h2>
    <p>Enter flower measurements (cm).</p>

    <form action="/predict" method="POST">
      <div class="grid">
        <div>
          <label>Sepal length</label>
          <input name="sepal_length" type="number" step="0.01" min="0" required>
        </div>

        <div>
          <label>Sepal width</label>
          <input name="sepal_width" type="number" step="0.01" min="0" required>
        </div>

        <div>
          <label>Petal length</label>
          <input name="petal_length" type="number" step="0.01" min="0" required>
        </div>

        <div>
          <label>Petal width</label>
          <input name="petal_width" type="number" step="0.01" min="0" required>
        </div>
      </div>

      <button type="submit">Predict</button>
    </form>

    {% if result %}
      <div class="result">
        Predicted species: <b>{{ result }}</b>
      </div>
    {% endif %}

    <div class="note">
      Model trained using the classic Iris dataset (3 species).
    </div>
  </div>
</body>
</html>
